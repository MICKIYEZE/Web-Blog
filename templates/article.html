<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .article-box {
            background: white;
            width: 600px;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            text-align: center;
        }

        .article-box h1 {
            margin-top: 0;
            font-size: 30px;
        }

        .article-meta {
            margin-top: 10px;
            font-size: 15px;
            color: #555;
        }

        .article-content {
            margin: 20px auto 0 auto;
            max-width: 500px;
            text-align: center;
            line-height: 1.6;
            font-size: 17px;
            white-space: pre-wrap;
        }

        .back-btn {
            width: 100%;
            padding: 12px;
            margin-top: 25px;
            background-color: #007bff;   /* blue like the others */
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .back-btn:hover {
            background-color: #0056b3;   /* darker blue hover */
        }
    </style>
</head>
<body>

<div class="article-box">
    <h1>{{.Title}}</h1>

    <div class="article-meta">
        <p><strong>Published:</strong> {{.Published}}</p>
        <p><strong>Author:</strong> {{.Author}}</p>
    </div>

    <div class="article-content">
        {{.Content}}
    </div>

    <button class="back-btn" onclick="window.location.href='/'">Back to Articles</button>
</div>

</body>
</html>
