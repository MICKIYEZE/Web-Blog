<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #ccc;
            text-align: center;
            box-sizing: border-box;
        }

        .login-box h1 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .login-btn:hover {
            background-color: #0056b3;
        }

        .back-btn {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .back-btn:hover {
            background-color: #565e64;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h1>Login</h1>

    <form action="/login" method="POST">
        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button class="login-btn" type="submit">Login</button>
    </form>

    <button class="back-btn" onclick="window.location.href='/'">Back to Home</button>
</div>

</body>
</html>
