<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>↓ Dashboard ↓</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        /* Header */
        .header-container {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .header-container h1 {
            margin: 0;
            font-size: 32px;
        }

        /* Buttons left and right */
        .left-button {
            position: absolute;
            left: 0;
            top: 0;
        }

        .right-button {
            position: absolute;
            right: 0;
            top: 0;
        }

        .left-button button,
        .right-button button {
            padding: 10px 18px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .left-button button:hover,
        .right-button button:hover {
            background-color: #0056b3;
        }

        /* Article block */
        .article {
            background: white;
            max-width: 700px;
            margin: 20px auto;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #ccc;
            text-align: center;
            position: relative;
        }

        /* Article ID top-left */
        .article-id {
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 14px;
            color: #777;
        }

        .article h2 {
            margin: 0;
            font-size: 24px;
        }

        .article p {
            margin: 10px 0;
            font-size: 16px;
        }

        .action-buttons {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .action-buttons button {
            padding: 8px 14px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            font-size: 14px;
        }

        .action-buttons button:hover {
            background-color: #0056b3;
        }

        form {
            display: inline;
        }
    </style>
</head>
<body>

<div class="header-container">
    <h1>Dashboard</h1>

    <div class="left-button">
        <button onclick="window.location.href='/logout'">Logout</button>
    </div>

    <div class="right-button">
        <button onclick="window.location.href='/new'">+ Add</button>
    </div>
</div>

{{range .}}
<div class="article">
    <div class="article-id">ID: {{.ID}}</div>

    <h2>{{.Title}}</h2>
    <p>{{.Published}}</p>
    <p>{{.Content}}</p>

    <div class="action-buttons">
        <button onclick="window.location.href='/edit?id={{.ID}}'">Edit</button>

        <form action="/delete?id={{.ID}}" method="POST">
            <button type="submit">Delete</button>
        </form>
    </div>
</div>
{{end}}

</body>
</html>
