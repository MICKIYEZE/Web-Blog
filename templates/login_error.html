<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Error</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .error-box {
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            text-align: center;
        }

        .error-box h1 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 26px;
            color: #d9534f;
        }

        .error-box p {
            margin-bottom: 20px;
            font-size: 15px;
            color: #555;
        }

        .error-box input {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .retry-btn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .retry-btn:hover {
            background-color: #0056b3;
        }

        .back-btn {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .back-btn:hover {
            background-color: #565e64;
        }
    </style>
</head>
<body>

<div class="error-box">
    <h1>Login Failed</h1>
    <p>Incorrect username or password.</p>

    <form action="/login" method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button class="retry-btn" type="submit">Try Again</button>
    </form>

    <button class="back-btn" onclick="window.location.href='/'">Back to Home</button>
</div>

</body>
</html>
